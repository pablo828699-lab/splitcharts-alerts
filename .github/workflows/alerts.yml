name: SplitCharts Alerts

# Disparado por el pinger externo (cron-job.org) cada 5 min, o a mano.
# (Se quitó el cron nativo de GitHub: disparaba en paralelo con el pinger y
#  provocaba choques de push en el guardado de estado.)
on:
  repository_dispatch:
    types: [run-alerts]
  workflow_dispatch: {}

# Permite que el job commitee de vuelta el estado (alerts_state.json).
permissions:
  contents: write

# Evita que dos corridas se pisen.
concurrency:
  group: splitcharts-alerts
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests "numpy<2" pandas ta yfinance

      - name: Run alert check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python telegram_alerts.py --once

      - name: Persist state
        run: |
          if [ -z "$(git status --porcelain alerts_state.json)" ]; then
            echo "sin cambios de estado"; exit 0
          fi
          git config user.name "splitcharts-alerts-bot"
          git config user.email "alerts-bot@users.noreply.github.com"
          git add alerts_state.json
          git commit -m "update alert state [skip ci]"
          # Reintentar contra carreras: traer lo último (conservando nuestro
          # estado en conflicto) y empujar. Nunca falla la corrida por esto.
          for i in 1 2 3 4 5; do
            git fetch origin main -q || true
            git rebase -X ours origin/main -q || git rebase --abort || true
            if git push origin HEAD:main; then
              echo "estado guardado"; exit 0
            fi
            echo "push rechazado, reintento $i..."; sleep 3
          done
          echo "no se pudo guardar el estado (se reintenta la proxima corrida)"; exit 0
